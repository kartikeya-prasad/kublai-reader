<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Clip to top semicircle only -->
    <clipPath id="semi-top">
      <rect x="0" y="0" width="100" height="50"/>
    </clipPath>
  </defs>

  <!-- Dark background -->
  <rect width="100" height="100" fill="#111111"/>

  <!-- Stained glass rose window — top semicircle -->
  <!-- Outer circle background (dark lead) -->
  <circle cx="50" cy="50" r="38" fill="#1a1008" clip-path="url(#semi-top)"/>

  <!-- Petal segments — 6 wedges in top half -->
  <path d="M50,50 L18,22 A38,38 0 0,1 36,13 Z" fill="#EA580C" clip-path="url(#semi-top)"/>
  <path d="M50,50 L36,13 A38,38 0 0,1 50,12 Z" fill="#F59E0B" clip-path="url(#semi-top)"/>
  <path d="M50,50 L50,12 A38,38 0 0,1 64,13 Z" fill="#CA8A04" clip-path="url(#semi-top)"/>
  <path d="M50,50 L64,13 A38,38 0 0,1 82,22 Z" fill="#16A34A" clip-path="url(#semi-top)"/>
  <path d="M50,50 L82,22 A38,38 0 0,1 88,50 Z" fill="#3B82F6" clip-path="url(#semi-top)"/>
  <path d="M50,50 L12,50 A38,38 0 0,1 18,22 Z" fill="#DC2626" clip-path="url(#semi-top)"/>

  <!-- Center hub -->
  <circle cx="50" cy="50" r="8" fill="#F59E0B" clip-path="url(#semi-top)"/>
  <circle cx="50" cy="50" r="8" fill="none" stroke="#111111" stroke-width="1.5" clip-path="url(#semi-top)"/>

  <!-- Lead lines (spokes from center to rim) -->
  <line x1="50" y1="50" x2="18" y2="22" stroke="#111111" stroke-width="1.5" clip-path="url(#semi-top)"/>
  <line x1="50" y1="50" x2="36" y2="13" stroke="#111111" stroke-width="1.5" clip-path="url(#semi-top)"/>
  <line x1="50" y1="50" x2="50" y2="12" stroke="#111111" stroke-width="1.5" clip-path="url(#semi-top)"/>
  <line x1="50" y1="50" x2="64" y2="13" stroke="#111111" stroke-width="1.5" clip-path="url(#semi-top)"/>
  <line x1="50" y1="50" x2="82" y2="22" stroke="#111111" stroke-width="1.5" clip-path="url(#semi-top)"/>
  <line x1="50" y1="50" x2="88" y2="50" stroke="#111111" stroke-width="1.5" clip-path="url(#semi-top)"/>
  <line x1="50" y1="50" x2="12" y2="50" stroke="#111111" stroke-width="1.5" clip-path="url(#semi-top)"/>

  <!-- Outer ring -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="#111111" stroke-width="2.5" clip-path="url(#semi-top)"/>

  <!-- Flat base line (horizon / windowsill) -->
  <rect x="10" y="48.5" width="80" height="3" fill="#111111"/>

  <!-- Cat silhouette — sitting, facing forward, black -->
  <!-- Body -->
  <ellipse cx="50" cy="79" rx="16" ry="14" fill="#111111"/>
  <!-- Head -->
  <ellipse cx="50" cy="60" rx="13" ry="12" fill="#111111"/>
  <!-- Left ear -->
  <polygon points="38,52 35,40 45,50" fill="#111111"/>
  <!-- Right ear -->
  <polygon points="62,52 65,40 55,50" fill="#111111"/>
  <!-- Tail — curls around bottom-left -->
  <path d="M 36 88 Q 22 92 20 80 Q 18 68 32 70" fill="none" stroke="#111111" stroke-width="5" stroke-linecap="round"/>

  <!-- Eyes — amber glow -->
  <ellipse cx="44" cy="59" rx="3.5" ry="3" fill="#F59E0B"/>
  <ellipse cx="56" cy="59" rx="3.5" ry="3" fill="#F59E0B"/>
  <!-- Slit pupils -->
  <ellipse cx="44" cy="59" rx="1.2" ry="2.5" fill="#111111"/>
  <ellipse cx="56" cy="59" rx="1.2" ry="2.5" fill="#111111"/>
  <!-- Eye shine -->
  <circle cx="42.5" cy="57.5" r="0.8" fill="white" opacity="0.8"/>
  <circle cx="54.5" cy="57.5" r="0.8" fill="white" opacity="0.8"/>
</svg>
